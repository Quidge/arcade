name: check

on:
  pull_request:
    branches: [main]

concurrency:
  group: check-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          install-only: true

      - uses: extractions/setup-just@v2

      - name: just check
        run: just check

      - name: Verify working tree is clean
        run: |
          if ! git diff --exit-code; then
            echo "::error::Working tree dirty after \`just check\`. Run \`just check\` locally and commit the changes."
            exit 1
          fi
